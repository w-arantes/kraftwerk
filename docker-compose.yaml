services:
  postgres:
    image: postgres:17-alpine
    container_name: kraftwerk-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kraftwerk
      POSTGRES_PASSWORD: kraftwerk
      POSTGRES_DB: kraftwerk
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
